<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Dış daire arka plan -->
  <circle cx="100" cy="100" r="95" fill="#4C2744"/>
  <!-- İnce iç daire halkası -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#F6E2C7" stroke-width="1.2"/>
  <!-- Üst yay çizgisi (logo içindeki dekoratif kıvrım) -->
  <path d="M 38 78 Q 100 55 162 78" fill="none" stroke="#F6E2C7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- "aşına" ana metin -->
  <text x="100" y="115" font-family="Georgia, serif" font-size="38" font-weight="400" 
        fill="#F6E2C7" text-anchor="middle" letter-spacing="1">aşına</text>
  <!-- Alt dekoratif kıvrım -->
  <path d="M 62 125 Q 72 135 82 128 Q 92 122 100 128 Q 108 135 118 128 Q 128 122 138 128" 
        fill="none" stroke="#F6E2C7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Noktalı "AYVALIK" yazısı -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="11" font-weight="600"
        fill="#F6E2C7" text-anchor="middle" letter-spacing="4">·AYVALIK·</text>
</svg>