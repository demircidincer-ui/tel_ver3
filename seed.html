<!DOCTYPE html>

<title>Aşına · Firebase Veri Yükle</title>
<style>

  p{color:#7A5F6A;font-size:14px;margin-bottom:24px;}
  .btn{background:#4C2744;color:#F6E2C7;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:.2s;}
  .btn:hover{background:#2E1428;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .log{margin-top:20px;background:white;border-radius:12px;padding:16px;font-size:13px;line-height:1.8;border:1px solid #ECD8CF;min-height:80px;max-height:300px;overflow-y:auto;}
  .ok{color:#27AE60;} .err{color:#FF3B30;} .info{color:#4C2744;}
  .warn{background:#FFF3CD;border:1px solid #C9963A;border-radius:10px;padding:12px;font-size:13px;color:#856404;margin-bottom:16px;}
</style>
</head>
<body>
<h2>🔥 Firebase Veri Yükleyici</h2>
<p>Bu sayfa mevcut menü verilerini Firebase'e yükler. <strong>Sadece bir kere çalıştır.</strong></p>

<div class="warn">
  ⚠️ Bu işlem Firebase'deki mevcut menü verisinin üzerine yazar. Eğer admin panelinden zaten veri girdiysen bu butona basma.
</div>

<button class="btn" id="seed-btn" onclick="seedData()">🚀 Menü Verilerini Firebase'e Yükle</button>
<div class="log" id="log">Hazır. Butona bas...</div>

const CAT_ORDER = ['Mevsime Özel','Sıcak Çikolata','Matcha','Sütlü Çay','Bitki Çayı','Klasikler','Ekstralar'];
const CAT_EMOJIS = {
  'Mevsime Özel':'❄️','Sıcak Çikolata':'🍫','Matcha':'🍵',
  'Sütlü Çay':'🥛','Bitki Çayı':'🌿','Klasikler':'☕','Ekstralar':'✨'
};

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.seedData = async function() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true;
  document.getElementById('log').innerHTML = '';

  try {
    log('📦 Menü hazırlanıyor... (29 ürün)');
    const menuObj = {};
    DEFAULT_MENU.forEach(item => { menuObj['id_' + item.id] = item; });

    log('🔥 Firebase\'e yazılıyor...');
    await set(ref(db, 'menu'), menuObj);
    log('✅ Menü yüklendi! (' + DEFAULT_MENU.length + ' ürün)', 'ok');

    log('⚙️ Kategori ayarları yazılıyor...');
    await set(ref(db, 'settings'), { catOrder: CAT_ORDER, catEmojis: CAT_EMOJIS });
    log('✅ Kategori sırası ve emojileri yüklendi!', 'ok');

    log('');
    log('🎉 Tamamlandı! Artık:', 'ok');
    log('  • admin.html → Menü sekmesinden tüm ürünleri görebilirsin', 'ok');
    log('  • index.html → Uygulamada menü anında görünecek', 'ok');
    log('  • Bu seed.html dosyasını artık silebilirsin', 'ok');
    log('');
    log('⚠️ Bu sayfayı Netlify\'dan kaldırmayı unutma!', 'err');

  } catch(err) {
    log('❌ Hata: ' + err.message, 'err');
    log('Firebase kurallarını kontrol et (Test mode aktif mi?)', 'err');
    btn.disabled = false;
  }
};
</script>
